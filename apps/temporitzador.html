<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporitzador d'aula - Gestió del temps</title>
    <!-- Tailwind CSS per a disseny ràpid, adaptatiu i professional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icones Phosphor per a una interfície neta -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CSS PERSONALITZAT: Estètica i accessibilitat */
        
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;700;800&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        /* Tipografia monoespaiada per als números del rellotge per evitar salts visuals */
        .font-mono-numbers {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Estat d'alarma visual (pelleig vermell) */
        @keyframes alarmPulse {
            0% { background-color: #fee2e2; }
            50% { background-color: #ef4444; }
            100% { background-color: #fee2e2; }
        }

        .alarm-active {
            animation: alarmPulse 1s infinite;
        }

        /* Accessibilitat: Focus visible millorat */
        *:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        /* Estils per als inputs de temps sense fletxes de navegador */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300" id="mainBody">

    <!-- CONTENIDOR PRINCIPAL -->
    <main class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- HEADER -->
        <header class="bg-indigo-600 p-6 text-white text-center relative">
            <h1 class="text-3xl font-bold flex items-center justify-center gap-3">
                <i class="ph ph-timer text-4xl"></i>
                Temporitzador d'aula
            </h1>
            <p class="text-indigo-100 text-sm mt-2">Eina de gestió del temps per a Primària i Secundària</p>
        </header>

        <!-- ZONA DE VISUALITZACIÓ DEL TEMPS -->
        <section class="p-8 text-center bg-gray-50 border-b border-gray-100 relative">
            <div id="timerDisplay" class="font-mono-numbers text-7xl md:text-9xl font-bold text-gray-800 tracking-tight leading-none select-none" role="timer" aria-live="polite">
                00:00:00
            </div>
            
            <!-- Barra de progrés visual -->
            <div class="w-full h-4 bg-gray-200 rounded-full mt-6 overflow-hidden">
                <div id="progressBar" class="h-full bg-indigo-500 transition-all duration-1000 ease-linear w-full"></div>
            </div>

            <!-- Missatge d'estat (accessible) -->
            <div id="statusMessage" class="mt-4 text-lg font-semibold text-gray-500 h-8">
                A punt per començar
            </div>
        </section>

        <!-- ZONA DE CONTROLS PRINCIPALS -->
        <section class="p-6 grid grid-cols-1 md:grid-cols-3 gap-4 bg-white">
            <!-- Inputs Manuals -->
            <div class="md:col-span-3 flex justify-center gap-2 items-end mb-4" id="inputContainer">
                <div class="flex flex-col text-center">
                    <label for="inputH" class="text-xs font-bold text-gray-500 uppercase mb-1">Hores</label>
                    <input type="number" id="inputH" min="0" max="99" value="00" class="w-20 h-16 text-3xl text-center border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-0 font-mono-numbers bg-gray-50">
                </div>
                <span class="text-3xl font-bold text-gray-400 pb-3">:</span>
                <div class="flex flex-col text-center">
                    <label for="inputM" class="text-xs font-bold text-gray-500 uppercase mb-1">Minuts</label>
                    <input type="number" id="inputM" min="0" max="59" value="00" class="w-20 h-16 text-3xl text-center border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-0 font-mono-numbers bg-gray-50">
                </div>
                <span class="text-3xl font-bold text-gray-400 pb-3">:</span>
                <div class="flex flex-col text-center">
                    <label for="inputS" class="text-xs font-bold text-gray-500 uppercase mb-1">Segons</label>
                    <input type="number" id="inputS" min="0" max="59" value="00" class="w-20 h-16 text-3xl text-center border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-0 font-mono-numbers bg-gray-50">
                </div>
            </div>

            <!-- Botons d'Acció -->
            <button id="btnStart" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg border-b-4 border-green-800">
                <i class="ph ph-play text-2xl"></i> INICIAR
            </button>
            
            <button id="btnPause" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg border-b-4 border-amber-700 hidden">
                <i class="ph ph-pause text-2xl"></i> PAUSAR
            </button>

            <button id="btnStopAlarm" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg border-b-4 border-red-800 hidden animate-pulse">
                <i class="ph ph-bell-slash text-2xl"></i> ATURAR ALARMA
            </button>

            <button id="btnReset" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 border-b-4 border-gray-400">
                <i class="ph ph-arrow-counter-clockwise text-2xl"></i> REINICIAR
            </button>

             <button id="btnSavePreset" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 border-b-4 border-indigo-200">
                <i class="ph ph-floppy-disk text-2xl"></i> DESAR
            </button>
        </section>

        <!-- ZONA DE PREDEFINITS (PRESETS) -->
        <section class="bg-gray-50 p-6 border-t border-gray-200">
            <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
                <i class="ph ph-bookmark"></i> Temps Predefinits
            </h2>
            
            <!-- Llista de presets -->
            <div id="presetsList" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- S'omplirà amb JS -->
            </div>
            
            <p id="emptyPresetsMsg" class="text-gray-400 text-sm italic text-center py-4">No hi ha temps desats. Configura un temps i prem "Desar".</p>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="mt-8 text-center text-gray-500 text-sm">
        <p>Eina educativa accessible • Desenvolupada per a l'aula</p>
    </footer>

    <!-- JAVASCRIPT: LÒGICA DE L'APLICACIÓ -->
    <script>
        /**
         * CLASSE TIMER
         * Gestiona la lògica del compte enrere i l'estat.
         */
        class ClassroomTimer {
            constructor() {
                // Estat
                this.totalSeconds = 0;
                this.remainingSeconds = 0;
                this.intervalId = null;
                this.isRunning = false;
                this.isAlarmPlaying = false;
                
                // Audio Context per a l'alarma (Més fiable que carregar MP3s externs)
                this.audioCtx = null;
                this.oscillator = null;
                this.gainNode = null;

                // Elements del DOM
                this.elDisplay = document.getElementById('timerDisplay');
                this.elProgressBar = document.getElementById('progressBar');
                this.elStatus = document.getElementById('statusMessage');
                this.elBody = document.getElementById('mainBody');
                
                this.elInputH = document.getElementById('inputH');
                this.elInputM = document.getElementById('inputM');
                this.elInputS = document.getElementById('inputS');
                this.elInputContainer = document.getElementById('inputContainer');

                this.btnStart = document.getElementById('btnStart');
                this.btnPause = document.getElementById('btnPause');
                this.btnReset = document.getElementById('btnReset');
                this.btnStopAlarm = document.getElementById('btnStopAlarm');
                this.btnSavePreset = document.getElementById('btnSavePreset');
                this.elPresetsList = document.getElementById('presetsList');
                this.elEmptyMsg = document.getElementById('emptyPresetsMsg');

                // Gestió de Presets
                this.presets = JSON.parse(localStorage.getItem('timer_presets')) || [
                    { id: 1, name: 'Lectura Ràpida', seconds: 300 }, // 5 min
                    { id: 2, name: 'Examen Curt', seconds: 900 }     // 15 min
                ];

                this.init();
            }

            init() {
                this.addEventListeners();
                this.renderPresets();
                this.padInputs();
            }

            addEventListeners() {
                this.btnStart.addEventListener('click', () => this.start());
                this.btnPause.addEventListener('click', () => this.pause());
                this.btnReset.addEventListener('click', () => this.reset());
                // CORRECCIÓ: Cridem a reset() en lloc de stopAlarm() per evitar recursivitat
                this.btnStopAlarm.addEventListener('click', () => this.reset());
                this.btnSavePreset.addEventListener('click', () => this.saveCurrentAsPreset());

                // Formatar inputs quan perden el focus
                [this.elInputH, this.elInputM, this.elInputS].forEach(input => {
                    input.addEventListener('change', () => this.validateAndPadInput(input));
                });
            }

            // --- LÒGICA DEL TEMPORITZADOR ---

            getInputSeconds() {
                const h = parseInt(this.elInputH.value) || 0;
                const m = parseInt(this.elInputM.value) || 0;
                const s = parseInt(this.elInputS.value) || 0;
                return (h * 3600) + (m * 60) + s;
            }

            setTime(seconds) {
                this.totalSeconds = seconds;
                this.remainingSeconds = seconds;
                this.updateDisplay();
                
                // Actualitzar inputs per reflectir el temps seleccionat (útil si ve d'un preset)
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                
                this.elInputH.value = h.toString().padStart(2, '0');
                this.elInputM.value = m.toString().padStart(2, '0');
                this.elInputS.value = s.toString().padStart(2, '0');
            }

            start() {
                if (!this.isRunning) {
                    // Si estem a 0 i l'usuari prem start, agafem els valors dels inputs
                    if (this.remainingSeconds === 0) {
                        const inputSecs = this.getInputSeconds();
                        if (inputSecs === 0) {
                            alert("Si us plau, introdueix un temps superior a 0.");
                            return;
                        }
                        this.totalSeconds = inputSecs;
                        this.remainingSeconds = inputSecs;
                    }

                    // Inicialitzar Audio Context (requereix gest d'usuari)
                    if (!this.audioCtx) {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (this.audioCtx.state === 'suspended') {
                        this.audioCtx.resume();
                    }

                    this.isRunning = true;
                    this.updateControlsState();
                    this.elStatus.innerText = "Temps en marxa...";
                    this.elStatus.className = "mt-4 text-lg font-bold text-green-600 h-8";
                    this.elInputContainer.classList.add('opacity-50', 'pointer-events-none'); // Desactivar inputs

                    this.intervalId = setInterval(() => {
                        this.tick();
                    }, 1000);
                }
            }

            pause() {
                if (this.isRunning) {
                    clearInterval(this.intervalId);
                    this.isRunning = false;
                    this.updateControlsState();
                    this.elStatus.innerText = "En pausa";
                    this.elStatus.className = "mt-4 text-lg font-bold text-amber-500 h-8";
                }
            }

            reset() {
                this.pause();
                this.stopAlarm(); // Aquest mètode atura els efectes (visuals/so)
                this.remainingSeconds = 0;
                this.totalSeconds = 0;
                
                // Reset inputs
                this.elInputH.value = "00";
                this.elInputM.value = "00";
                this.elInputS.value = "00";
                
                this.elInputContainer.classList.remove('opacity-50', 'pointer-events-none');
                this.elStatus.innerText = "A punt per començar";
                this.elStatus.className = "mt-4 text-lg font-semibold text-gray-500 h-8";
                this.updateDisplay();
            }

            tick() {
                if (this.remainingSeconds > 0) {
                    this.remainingSeconds--;
                    this.updateDisplay();
                } else {
                    this.triggerAlarm();
                }
            }

            updateDisplay() {
                const h = Math.floor(this.remainingSeconds / 3600);
                const m = Math.floor((this.remainingSeconds % 3600) / 60);
                const s = this.remainingSeconds % 60;

                const displayString = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                this.elDisplay.innerText = displayString;
                document.title = `${displayString} - Temporitzador`;

                // Actualitzar barra de progrés
                if (this.totalSeconds > 0) {
                    const percentage = (this.remainingSeconds / this.totalSeconds) * 100;
                    this.elProgressBar.style.width = `${percentage}%`;
                    
                    // Canviar color de barra segons urgència
                    if (percentage < 20) {
                        this.elProgressBar.className = "h-full w-full bg-red-500 transition-all duration-1000 ease-linear";
                    } else if (percentage < 50) {
                        this.elProgressBar.className = "h-full w-full bg-amber-500 transition-all duration-1000 ease-linear";
                    } else {
                        this.elProgressBar.className = "h-full w-full bg-indigo-500 transition-all duration-1000 ease-linear";
                    }
                }
            }

            updateControlsState() {
                if (this.isRunning) {
                    this.btnStart.classList.add('hidden');
                    this.btnPause.classList.remove('hidden');
                    this.btnSavePreset.classList.add('hidden'); // No guardar mentre corre
                } else {
                    this.btnStart.classList.remove('hidden');
                    this.btnPause.classList.add('hidden');
                    this.btnSavePreset.classList.remove('hidden');
                    
                    // Canviar text botó start si és reprendre
                    if (this.remainingSeconds > 0 && this.remainingSeconds < this.totalSeconds) {
                        this.btnStart.innerHTML = '<i class="ph ph-play text-2xl"></i> REPRENDRE';
                    } else {
                        this.btnStart.innerHTML = '<i class="ph ph-play text-2xl"></i> INICIAR';
                    }
                }
            }

            // --- ALARMA I SO ---

            triggerAlarm() {
                this.pause(); // Aturar el cronòmetre tècnicament
                this.remainingSeconds = 0;
                this.updateDisplay();
                this.isAlarmPlaying = true;

                // UI d'Alarma
                this.elStatus.innerText = "TEMPS ESGOTAT!";
                this.elStatus.className = "mt-4 text-lg font-black text-red-600 h-8";
                this.elBody.classList.add('alarm-active'); // Fons parpellejant
                
                this.btnStart.classList.add('hidden');
                this.btnPause.classList.add('hidden');
                this.btnReset.classList.add('hidden');
                this.btnStopAlarm.classList.remove('hidden');

                this.playAlarmSound();
            }

            playAlarmSound() {
                if (!this.audioCtx) return;

                // Crear oscil·lador per fer un so tipus "Beep Beep"
                const playBeep = () => {
                    if (!this.isAlarmPlaying) return;

                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();

                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, this.audioCtx.currentTime); // A5
                    osc.frequency.setValueAtTime(440, this.audioCtx.currentTime + 0.1); // A4
                    
                    gain.gain.setValueAtTime(0.5, this.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.5);

                    osc.start();
                    osc.stop(this.audioCtx.currentTime + 0.5);
                };

                playBeep();
                this.alarmInterval = setInterval(playBeep, 1000); // Repetir cada segon
            }

            stopAlarm() {
                // CORRECCIÓ: Aquesta funció només atura els efectes i restaura UI bàsica,
                // ja no crida a this.reset() per evitar el bucle infinit.
                this.isAlarmPlaying = false;
                if (this.alarmInterval) clearInterval(this.alarmInterval);
                
                this.elBody.classList.remove('alarm-active');
                this.btnStopAlarm.classList.add('hidden');
                this.btnReset.classList.remove('hidden');
            }

            // --- GESTIÓ DE PRESETS ---

            saveCurrentAsPreset() {
                const secs = this.getInputSeconds();
                if (secs === 0) {
                    alert("Introdueix un temps per guardar-lo.");
                    return;
                }

                const name = prompt("Nom per a aquest temps (ex: Lectura silenciosa):", "Nou Temps");
                if (name) {
                    const newPreset = {
                        id: Date.now(),
                        name: name,
                        seconds: secs
                    };
                    this.presets.push(newPreset);
                    this.savePresetsToStorage();
                    this.renderPresets();
                }
            }

            deletePreset(id) {
                if(confirm("Vols eliminar aquest temps guardat?")) {
                    this.presets = this.presets.filter(p => p.id !== id);
                    this.savePresetsToStorage();
                    this.renderPresets();
                }
            }

            savePresetsToStorage() {
                localStorage.setItem('timer_presets', JSON.stringify(this.presets));
            }

            renderPresets() {
                this.elPresetsList.innerHTML = '';
                
                if (this.presets.length === 0) {
                    this.elEmptyMsg.style.display = 'block';
                } else {
                    this.elEmptyMsg.style.display = 'none';
                    this.presets.forEach(preset => {
                        const h = Math.floor(preset.seconds / 3600);
                        const m = Math.floor((preset.seconds % 3600) / 60);
                        const s = preset.seconds % 60;
                        const timeStr = `${h>0 ? h+'h ' : ''}${m}m ${s>0 ? s+'s' : ''}`;

                        const btn = document.createElement('div');
                        btn.className = "flex items-center justify-between bg-white p-3 rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition-shadow group";
                        btn.innerHTML = `
                            <button class="flex-grow text-left flex items-center gap-3 focus:outline-none" onclick="timerApp.loadPreset(${preset.seconds})">
                                <div class="bg-indigo-100 text-indigo-600 p-2 rounded-full">
                                    <i class="ph ph-clock-countdown text-xl"></i>
                                </div>
                                <div>
                                    <div class="font-bold text-gray-800 text-sm">${preset.name}</div>
                                    <div class="text-xs text-gray-500 font-mono">${timeStr}</div>
                                </div>
                            </button>
                            <button class="text-gray-300 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" onclick="timerApp.deletePreset(${preset.id})" aria-label="Eliminar preset">
                                <i class="ph ph-trash text-lg"></i>
                            </button>
                        `;
                        this.elPresetsList.appendChild(btn);
                    });
                }
            }

            loadPreset(seconds) {
                if (this.isRunning) return; // No canviar mentre corre
                this.reset();
                this.setTime(seconds);
            }

            // --- UTILITATS ---

            validateAndPadInput(input) {
                let val = parseInt(input.value);
                const max = parseInt(input.getAttribute('max'));
                const min = parseInt(input.getAttribute('min'));

                if (isNaN(val)) val = 0;
                if (val > max) val = max;
                if (val < min) val = min;

                input.value = val.toString().padStart(2, '0');
            }

            padInputs() {
                this.validateAndPadInput(this.elInputH);
                this.validateAndPadInput(this.elInputM);
                this.validateAndPadInput(this.elInputS);
            }
        }

        // Inicialitzar l'aplicació quan el DOM estigui llest
        let timerApp;
        document.addEventListener('DOMContentLoaded', () => {
            timerApp = new ClassroomTimer();
            // Fer l'app accessible globalment per als onclicks inline
            window.timerApp = timerApp;
        });

    </script>
</body>
</html>

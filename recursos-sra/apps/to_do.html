<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llista de Tasques</title>
    <!-- Càrrega de Tailwind CSS per a l'estil. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importació de Phosphor Icons, usats a l'arxiu Kanban -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* CSS PERSONALITZAT basat en l'arxiu Kanban */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

        body {
            /* Aplica la font Nunito */
            font-family: 'Nunito', sans-serif;
            background-color: #f3f4f6; /* Fons general més clar */
            color: #1f2937;
        }

        /* Estils comuns de botons de l'arxiu Kanban */
        .button-primary {
            /* Fons blau/índigo fosc amb efecte 3D */
            @apply bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-[0.98] shadow-lg border-b-4 border-indigo-800;
        }
        .button-secondary {
            /* Botó secundari (per a modal, etc.) */
            @apply bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-[0.98] border-b-4 border-gray-400;
        }

        /* Estils per a la tasca completada */
        .task-completed .task-text {
            text-decoration: line-through;
            color: #10b981; /* Verd esmeralda 500 */
        }
        
        .task-completed .task-dates {
            color: #10b981;
            opacity: 0.9;
        }

        /* Animació suau per a les tasques (més subtil) */
        .task-item {
            transition: all 0.2s ease;
            border-left-width: 4px; /* Afegim una barra de color */
        }
        
        .task-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px -2px rgba(0, 0, 0, 0.1);
        }

        /* Personalització del checkbox (Verd esmeralda) */
        input[type="checkbox"] {
            accent-color: #059669; /* Verd 600 */
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
        }

        /* Estil d'input per a l'edició, basat en el Kanban */
        .input-text {
            @apply w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition shadow-sm;
        }

    </style>
</head>
<body class="min-h-screen py-8 px-4 relative">

    <!-- S'HA ELIMINAT EL MODAL DE COMPLETAT per aplicar la data automàticament. -->

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- Encapçalament (Estil de Kanban) -->
        <div class="bg-indigo-700 p-6 text-white rounded-t-xl shadow-lg">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-extrabold flex items-center gap-2">
                    <i class="ph ph-list-checks text-3xl"></i>
                    Gestor de Tasques
                </h1>
                <!-- Element del comptador -->
                <div id="incompleteCountDisplay" class="text-lg font-bold bg-white text-indigo-700 px-3 py-1 rounded-full shadow-inner">
                    0 Pendents
                </div>
            </div>
            <p class="text-indigo-100 text-sm mt-1">Organitza el teu dia a dia</p>
        </div>

        <!-- Formulari d'entrada -->
        <div class="p-6 bg-gray-50 border-b border-gray-200">
            <form id="taskForm" class="space-y-4 md:space-y-0 md:flex md:gap-4 md:items-end">
                
                <!-- Descripció de la tasca -->
                <div class="flex-grow">
                    <label for="taskInput" class="block text-sm font-medium text-gray-700 mb-1">Descripció de la tasca</label>
                    <input type="text" id="taskInput" placeholder="Què has de fer avui?" required
                        class="input-text">
                </div>

                <!-- Data d'inici -->
                <div class="w-full md:w-48">
                    <label for="startDateInput" class="block text-sm font-medium text-gray-700 mb-1">Data d'inici</label>
                    <input type="date" id="startDateInput" required
                        class="input-text text-sm">
                </div>

                <!-- Botó d'acció -->
                <div class="w-full md:w-auto">
                    <button type="submit" id="addBtn"
                        class="w-full button-primary">
                        <i class="ph ph-plus-circle text-xl"></i>
                        Afegir
                    </button>
                    <!-- CORRECCIÓ: Canviat type="button" a type="submit" perquè el formulari s'enviï i executi la lògica d'actualització -->
                    <button type="submit" id="updateBtn" class="hidden w-full button-primary bg-emerald-600 hover:bg-emerald-700 border-emerald-800">
                        <i class="ph ph-floppy-disk text-xl"></i>
                        Guardar
                    </button>
                    <button type="button" id="cancelBtn" class="hidden mt-2 md:mt-0 w-full md:w-auto text-gray-500 hover:text-gray-700 text-sm py-2 px-2 underline text-center">
                        Cancel·lar
                    </button>
                </div>
            </form>
        </div>

        <!-- Llista de tasques -->
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Les teves tasques</h2>
                <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded-full">Ordenat per data d'inici (més recent)</span>
            </div>
            
            <ul id="taskList" class="space-y-3">
                <!-- Les tasques s'injectaran aquí via JavaScript -->
            </ul>
            
            <div id="emptyState" class="hidden text-center py-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 mb-4">
                    <i class="ph ph-clipboard-text text-3xl text-indigo-600"></i>
                </div>
                <h3 class="text-xl font-medium text-gray-900">No hi ha tasques pendents</h3>
                <p class="text-gray-500">Afegeix una nova tasca per començar.</p>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Variables d'Estat
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        let isEditing = false;
        let editingId = null;
        // pendingCompletionId i altres variables del modal s'eliminen

        // Elements del DOM
        const form = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const startDateInput = document.getElementById('startDateInput');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const addBtn = document.getElementById('addBtn');
        const updateBtn = document.getElementById('updateBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const incompleteCountDisplay = document.getElementById('incompleteCountDisplay');

        // Elements del Modal (Eliminats o no usats)
        // const completionModal = document.getElementById('completionModal');

        // Utilitat per obtenir la data actual en format YYYY-MM-DD
        function getTodayDateString() {
            return new Date().toISOString().split('T')[0];
        }

        // Inicialització
        document.addEventListener('DOMContentLoaded', () => {
            renderTasks();
            
            // Establir data d'avui per defecte
            startDateInput.value = getTodayDateString();
        });

        // Event Listener: Submissió del formulari
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (isEditing) {
                updateExistingTask();
            } else {
                addNewTask();
            }
        });

        // Event Listener: Cancel·lar edició
        cancelBtn.addEventListener('click', resetForm);

        // --- GESTIÓ DEL MODAL (Eliminada) ---
        // S'han eliminat tots els listeners i funcions relacionades amb el modal.

        // --- LÒGICA DE TASQUES ---

        // Funció: Afegir Tasca
        function addNewTask() {
            const newTask = {
                id: Date.now(),
                text: taskInput.value,
                startDate: startDateInput.value,
                endDate: null, 
                completed: false
            };

            tasks.push(newTask);
            saveAndRender();
            resetForm();
        }

        // Funció: Actualitzar Tasca existent
        function updateExistingTask() {
            const taskIndex = tasks.findIndex(t => t.id === editingId);
            if (taskIndex > -1) {
                tasks[taskIndex].text = taskInput.value;
                tasks[taskIndex].startDate = startDateInput.value;
            }
            saveAndRender();
            resetForm();
        }

        // Funció: Eliminar Tasca
        function deleteTask(id) {
            // Usar un missatge personalitzat en comptes de confirm()
            if(confirm('Estàs segur que vols eliminar aquesta tasca?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveAndRender();
            }
        }

        // Funció: Canviar estat Completat (Lògica simplificada)
        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                // Invertim l'estat actual
                task.completed = !task.completed;
                
                if (task.completed) {
                    // Si es marca com a completada, assignem la data d'avui
                    task.endDate = getTodayDateString();
                } else {
                    // Si es desmarca, esborrem la data de tancament
                    task.endDate = null;
                }
                
                saveAndRender();
            }
        }

        // Funció: Preparar edició
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                // Omplir el formulari amb les dades
                taskInput.value = task.text;
                startDateInput.value = task.startDate;
                
                // Canviar estat de la UI a "Edició"
                isEditing = true;
                editingId = id;
                addBtn.classList.add('hidden');
                updateBtn.classList.remove('hidden');
                cancelBtn.classList.remove('hidden');
                
                // Fer focus al camp de text
                taskInput.focus();
                
                // Scroll cap a dalt en mòbils
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Funció: Actualitza el comptador de tasques no completades
        function updateIncompleteCount() {
            const incompleteCount = tasks.filter(t => !t.completed).length;
            incompleteCountDisplay.textContent = `${incompleteCount} Pendents`;
        }


        // Funció: Renderitzar la llista
        function renderTasks() {
            taskList.innerHTML = '';
            updateIncompleteCount(); // Actualitza el comptador

            // Ordenació: Més recent a més antiga (b - a)
            tasks.sort((a, b) => new Date(b.startDate) - new Date(a.startDate));

            if (tasks.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    // Estil actualitzat amb border-l-4 per indicar l'estat ràpidament
                    li.className = `task-item bg-white p-4 rounded-xl shadow-md flex flex-col sm:flex-row items-start sm:items-center gap-4 transition duration-150 ease-in-out ${task.completed ? 'task-completed bg-green-50 border-emerald-500' : 'border-indigo-500'}`;
                    
                    // Formatejar dates per mostrar
                    const startDisplay = formatDate(task.startDate);
                    const endDisplay = task.completed && task.endDate ? formatDate(task.endDate) : '';

                    li.innerHTML = `
                        <div class="flex items-center gap-3 flex-grow w-full">
                            <!-- Usem id i onclick per controlar el checkbox -->
                            <input type="checkbox" 
                                id="checkbox-${task.id}"
                                onclick="toggleComplete(${task.id})" 
                                ${task.completed ? 'checked' : ''}
                                class="mt-1 sm:mt-0 flex-shrink-0">
                            
                            <div class="flex-grow">
                                <p class="task-text font-bold text-gray-800 text-lg break-all">${escapeHtml(task.text)}</p>
                                <div class="task-dates text-xs text-gray-500 mt-1 flex flex-wrap gap-3">
                                    <span class="flex items-center gap-1">
                                        <i class="ph ph-calendar text-base"></i> Inici: ${startDisplay}
                                    </span>
                                    ${task.completed && endDisplay ? `
                                    <span class="flex items-center gap-1 font-medium text-emerald-600">
                                        <i class="ph ph-flag-checkered text-base"></i> Tancament: ${endDisplay}
                                    </span>
                                    ` : ''}
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 mt-2 sm:mt-0 w-full sm:w-auto justify-end">
                            <button onclick="editTask(${task.id})" 
                                class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-full transition" 
                                title="Editar">
                                <i class="ph ph-pencil-simple-line text-lg"></i>
                            </button>
                            <button onclick="deleteTask(${task.id})" 
                                class="p-2 text-red-600 hover:bg-red-50 rounded-full transition" 
                                title="Eliminar">
                                <i class="ph ph-trash text-lg"></i>
                            </button>
                        </div>
                    `;
                    taskList.appendChild(li);
                });
            }
        }

        // Utilitats
        function saveAndRender() {
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function resetForm() {
            form.reset();
            isEditing = false;
            editingId = null;
            addBtn.classList.remove('hidden');
            updateBtn.classList.add('hidden');
            cancelBtn.classList.add('hidden');
            
            // Reset dates to today
            startDateInput.value = getTodayDateString();
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            return new Date(dateString).toLocaleDateString('ca-ES', options);
        }

        // Seguretat simple per evitar XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
